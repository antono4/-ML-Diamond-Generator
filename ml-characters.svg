<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="heroGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="heroGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Character 1 - Fighter (Blue) -->
  <g id="fighter" transform="translate(50, 50)">
    <!-- Body -->
    <ellipse cx="100" cy="180" rx="60" ry="80" fill="url(#heroGrad1)"/>
    <!-- Head -->
    <circle cx="100" cy="80" r="50" fill="#ffd4a3"/>
    <!-- Hair -->
    <path d="M50 70 Q100 20 150 70 Q140 50 100 40 Q60 50 50 70" fill="#2c3e50"/>
    <!-- Eyes -->
    <ellipse cx="80" cy="80" rx="8" ry="10" fill="#2c3e50"/>
    <ellipse cx="120" cy="80" rx="8" ry="10" fill="#2c3e50"/>
    <circle cx="82" cy="78" r="3" fill="#fff"/>
    <circle cx="122" cy="78" r="3" fill="#fff"/>
    <!-- Mouth -->
    <path d="M90 100 Q100 110 110 100" stroke="#c0392b" stroke-width="3" fill="none"/>
    <!-- Sword -->
    <rect x="170" y="120" width="15" height="120" rx="5" fill="#95a5a6"/>
    <rect x="160" y="230" width="35" height="20" rx="3" fill="#f39c12"/>
    <polygon points="177.5,50 190,120 165,120" fill="#bdc3c7"/>
  </g>
  
  <!-- Character 2 - Mage (Red) -->
  <g id="mage" transform="translate(200, 80)">
    <!-- Body/Robe -->
    <path d="M50 100 L20 280 L130 280 L100 100" fill="url(#heroGrad2)"/>
    <!-- Head -->
    <circle cx="75" cy="70" r="40" fill="#ffd4a3"/>
    <!-- Wizard Hat -->
    <path d="M35 60 L75 -20 L115 60 Q75 50 35 60" fill="#8e44ad"/>
    <ellipse cx="75" cy="60" rx="45" ry="15" fill="#9b59b6"/>
    <!-- Eyes -->
    <ellipse cx="60" cy="70" rx="6" ry="8" fill="#2c3e50"/>
    <ellipse cx="90" cy="70" rx="6" ry="8" fill="#2c3e50"/>
    <circle cx="61" cy="68" r="2" fill="#fff"/>
    <circle cx="91" cy="68" r="2" fill="#fff"/>
    <!-- Staff -->
    <rect x="130" y="50" width="10" height="200" rx="3" fill="#8b4513"/>
    <circle cx="135" cy="40" r="25" fill="#f1c40f" filter="url(#glow)"/>
    <circle cx="135" cy="40" r="15" fill="#fff"/>
  </g>
  
  <!-- Character 3 - Assassin (Purple) -->
  <g id="assassin" transform="translate(100, 280)">
    <!-- Body -->
    <ellipse cx="100" cy="80" rx="45" ry="70" fill="url(#heroGrad3)"/>
    <!-- Head -->
    <circle cx="100" cy="30" r="35" fill="#8b6914"/>
    <!-- Hood -->
    <path d="M60 30 Q100 -20 140 30 Q130 10 100 0 Q70 10 60 30" fill="#2c3e50"/>
    <!-- Mask -->
    <rect x="65" y="20" width="70" height="25" rx="5" fill="#1a1a2e"/>
    <!-- Eyes (glowing) -->
    <ellipse cx="80" cy="32" rx="5" ry="6" fill="#e74c3c" filter="url(#glow)"/>
    <ellipse cx="120" cy="32" rx="5" ry="6" fill="#e74c3c" filter="url(#glow)"/>
    <!-- Daggers -->
    <g transform="rotate(-30, 40, 80)">
      <rect x="25" y="60" width="8" height="50" fill="#bdc3c7"/>
      <polygon points="29,40 35,60 23,60" fill="#ecf0f1"/>
    </g>
    <g transform="rotate(30, 160, 80)">
      <rect x="155" y="60" width="8" height="50" fill="#bdc3c7"/>
      <polygon points="159,40 165,60 153,60" fill="#ecf0f1"/>
    </g>
  </g>
</svg>
