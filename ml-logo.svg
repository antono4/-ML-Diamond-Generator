<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FFCC33"/>
    </linearGradient>
    <linearGradient id="mlBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Blue Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#mlBlue)" filter="url(#shadow)"/>
  <!-- Gold Border Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#mlGrad)" stroke-width="4"/>
  <!-- Crown -->
  <path d="M60 45 L75 65 L100 35 L125 65 L140 45 L145 55 L55 55 Z" fill="url(#mlGrad)"/>
  <rect x="55" y="55" width="90" height="12" rx="3" fill="url(#mlGrad)"/>
  <!-- ML Text -->
  <text x="100" y="140" font-family="Arial Black, Impact, sans-serif" font-size="70" font-weight="900" fill="url(#mlGrad)" text-anchor="middle" filter="url(#shadow)">ML</text>
  <!-- Decorative Stars -->
  <polygon points="50,150 53,158 62,158 55,163 58,172 50,167 42,172 45,163 38,158 47,158" fill="#fff"/>
  <polygon points="150,150 153,158 162,158 155,163 158,172 150,167 142,172 145,163 138,158 147,158" fill="#fff"/>
</svg>
