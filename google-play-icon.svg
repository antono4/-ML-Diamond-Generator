<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FFCC33"/>
    </linearGradient>
    <linearGradient id="gpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
    <filter id="gpShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gpBg)" filter="url(#gpShadow)"/>
  <!-- Gift Card Icon -->
  <rect x="50" y="70" width="100" height="70" rx="8" fill="none" stroke="url(#gpGrad)" stroke-width="6"/>
  <line x1="50" y1="90" x2="150" y2="90" stroke="url(#gpGrad)" stroke-width="4"/>
  <circle cx="130" cy="110" r="12" fill="url(#gpGrad)"/>
  <!-- Gift Bow -->
  <path d="M100 70 C80 50 60 60 70 80 L100 70 L130 80 C140 60 120 50 100 70" fill="url(#gpGrad)"/>
</svg>
